version: '3.8'

services:

  web:
    build: .
    container_name: petverse-web
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: root
      DB_NAME: pet_store

    ports:
      - "8080:80"

    depends_on:
      - db

    volumes:
      - .:/var/www/html

  db:
    image: mysql:8.0
    container_name: petverse-db

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pet_store

    ports:
      - "3308:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: